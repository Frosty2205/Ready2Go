<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CameraViewer</title>
  </head>
  <body>
    <div class="camera-container" id="monitor"></div>

    <div class="overlay">
      <h2 id="status">Iniciando sistema...</h2>
    </div>

    <video id="video-local" autoplay playsinline></video>
    <canvas id="snapshot" style="display: none"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/camera-client/script.js"></script>
  </body>
</html>

<style>
  * {
    box-sizing: border-box;
  }

  body,
  html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    color: white;
    font-family: sans-serif;
    overflow: hidden;
  }

  .camera-container {
    display: grid;
    width: 100vw;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    /* auto-fit hará que si hay 1 cámara ocupe todo, 
           y si hay 2 se pongan a los lados */
    grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    align-items: center;
    justify-content: center;
  }

  .remote-stream {
    width: 100%;
    height: 100%;
    max-height: 100%;
    object-fit: cover;
    border: 2px solid #333;
    border-radius: 8px;
    background-color: #111;
  }

  .overlay {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 100;
    pointer-events: none;
  }

  #video-local {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
</style>
